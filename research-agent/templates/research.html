<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research — {{ topic }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="container">
    <div class="topic-header">
      <h1>Research</h1>
      <p class="topic">{{ topic }}</p>
      <p><a href="/">&larr; New research</a></p>
    </div>

    <section id="progress-section">
      <details id="progress-details" open>
        <summary><strong>Live progress</strong></summary>
        <div id="progress-log">
          <span class="line">Connecting to agent stream…</span>
        </div>
      </details>
    </section>

    <div id="report-container"></div>

    <div id="error-container" hidden></div>
  </main>

  <script>
    (function () {
      const jobId = {{ job_id | tojson }};
      const log = document.getElementById('progress-log');
      const report = document.getElementById('report-container');
      const details = document.getElementById('progress-details');
      const errorBox = document.getElementById('error-container');

      const es = new EventSource(`/research/stream/${jobId}`);
      let finished = false;

      function appendLine(text, cls) {
        const span = document.createElement('span');
        span.className = 'line' + (cls ? ' ' + cls : '');
        span.textContent = text;
        log.appendChild(span);
        log.scrollTop = log.scrollHeight;
      }

      es.addEventListener('progress', (e) => {
        try {
          const payload = JSON.parse(e.data);
          appendLine(payload.line, payload.class || '');
        } catch (err) {
          appendLine(String(e.data));
        }
      });

      es.addEventListener('complete', (e) => {
        finished = true;
        es.close();                      // critical: prevents auto-reconnect
        try {
          const payload = JSON.parse(e.data);
          report.innerHTML = payload.html || '';
        } catch (err) {
          report.textContent = 'Failed to render report: ' + err;
        }
        if (details) details.open = false;
      });

      es.addEventListener('error', (e) => {
        // Distinguish a server-sent 'error' event from a transport-level failure.
        // A server-sent event has e.data; transport failures don't.
        if (e.data) {
          finished = true;
          es.close();
          try {
            const payload = JSON.parse(e.data);
            errorBox.textContent = 'Error: ' + (payload.message || 'Unknown');
          } catch (err) {
            errorBox.textContent = 'Error: ' + String(e.data);
          }
          errorBox.hidden = false;
        } else if (finished) {
          // Already done — suppress reconnect attempts.
          es.close();
        }
        // Otherwise it's a transient transport error; let the browser retry.
      });

      es.addEventListener('close', () => {
        finished = true;
        es.close();
      });

      window.addEventListener('beforeunload', () => { es.close(); });
    })();
  </script>
</body>
</html>
